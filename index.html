<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mses Maker - CPS Click Test</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;700&display=swap');
    
    * { 
      box-sizing: border-box; 
      margin: 0; 
      padding: 0; 
    }
    
    body {
      background-color: #0a0a1a; /* Fallback for the edges */
    }

    .site {
      font-family: 'Rajdhani', 'Arial Black', sans-serif;
      background: linear-gradient(160deg, #0a0a1a 0%, #0e1a3a 40%, #0a1a10 100%);
      min-height: 100vh; /* Changed to 100vh to fill the whole screen */
      width: 100%;
      overflow: hidden;
      position: relative;
      color: #fff;
    }

    .stars {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .star {
      position: absolute;
      background: #fff;
      border-radius: 50%;
      animation: twinkle var(--d, 2s) infinite alternate ease-in-out;
    }

    @keyframes twinkle {
      from { opacity: 0.1; }
      to { opacity: 0.85; }
    }

    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 28px 14px;
      position: relative;
      z-index: 10;
      border-bottom: 1px solid rgba(0,100,255,0.2);
      background: rgba(0,10,40,0.5);
      flex-wrap: wrap; /* Allows nav to wrap on very small screens */
      gap: 15px;
    }

    .logo {
      font-family: 'Orbitron', 'Arial Black', sans-serif;
      font-size: 22px;
      font-weight: 900;
      letter-spacing: 2px;
      background: linear-gradient(90deg, #4488ff, #66aaff, #99ccff);
      background-size: 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 3s linear infinite;
      filter: drop-shadow(0 0 8px rgba(80,140,255,0.6));
    }

    .logo span {
      background: linear-gradient(90deg, #2255dd, #5588ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    @keyframes shimmer {
      0% { background-position: 0% 50%; }
      100% { background-position: 200% 50%; }
    }

    .nav-links {
      display: flex;
      gap: 20px;
      list-style: none;
      flex-wrap: wrap; /* Keeps links from overflowing on small screens */
    }

    .nav-links li a {
      color: #6699cc;
      text-decoration: none;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: color 0.2s;
    }

    .nav-links li a:hover { color: #aaddff; }

    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(60,120,255,0.3), transparent);
      margin: 0 28px;
    }

    .cps-section {
      position: relative;
      z-index: 5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 28px 70px;
      gap: 20px;
      min-height: calc(100vh - 100px); /* Centers content vertically relative to nav */
    }

    .cps-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 13px;
      font-weight: 700;
      color: #334d80;
      letter-spacing: 3px;
      text-transform: uppercase;
      text-align: center;
    }

    .cps-heading {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(18px, 4vw, 28px);
      font-weight: 900;
      letter-spacing: 2px;
      text-transform: uppercase;
      background: linear-gradient(90deg, #4488ff, #aaddff, #4488ff);
      background-size: 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 2.5s linear infinite;
      text-align: center;
    }

    .cps-desc {
      font-size: 14px;
      color: #4a6a99;
      font-weight: 500;
      letter-spacing: 0.5px;
      text-align: center;
      max-width: 340px;
      line-height: 1.6;
    }

    .cps-btn {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: linear-gradient(135deg, #1144cc, #2266ff, #4488ff);
      color: #fff;
      font-family: 'Orbitron', sans-serif;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      text-decoration: none;
      border: none;
      padding: 18px 40px;
      border-radius: 8px;
      cursor: pointer;
      box-shadow: 0 0 30px rgba(40,100,255,0.5), 0 0 60px rgba(40,100,255,0.2);
      animation: pulse-glow 2s ease-in-out infinite;
      transition: transform 0.15s, box-shadow 0.15s;
      text-align: center;
    }

    .cps-btn:hover {
      transform: translateY(-3px) scale(1.03);
      box-shadow: 0 0 50px rgba(60,140,255,0.8), 0 0 100px rgba(60,140,255,0.3);
    }

    .cps-btn:active { transform: scale(0.97); }

    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 30px rgba(40,100,255,0.5), 0 0 60px rgba(40,100,255,0.2); }
      50% { box-shadow: 0 0 50px rgba(80,160,255,0.8), 0 0 90px rgba(80,160,255,0.3); }
    }

    .btn-icon { font-size: 20px; line-height: 1; }
    
    .cps-note {
      font-size: 11px;
      color: #283a5a;
      letter-spacing: 1px;
      text-transform: uppercase;
      text-align: center;
    }

    .diamond {
      display: inline-block;
      width: 7px; height: 7px;
      background: #4488ff;
      transform: rotate(45deg);
      margin: 0 8px;
      vertical-align: middle;
      opacity: 0.4;
    }
  </style>
</head>
<body>

  <div class="site">
    <div class="stars" id="stars"></div>

    <nav class="nav">
      <div class="logo">Mses <span>Maker</span></div>
      <ul class="nav-links">
        <li><a href="#">Home</a></li>
        <li><a href="#">Maps</a></li>
        <li><a href="#">Shop</a></li>
        <li><a href="#">Leaderboard</a></li>
      </ul>
    </nav>

    <div class="divider"></div>

    <div class="cps-section">
      <div class="cps-title"><span class="diamond"></span>Test Your Speed<span class="diamond"></span></div>
      <div class="cps-heading">CPS Click Test</div>
      <div class="cps-desc">How fast can you click? Test your clicks per second on xbitlabs and dominate the Bedwars meta.</div>
      <a class="cps-btn" href="https://www.xbitlabs.com/cps-test/" target="_blank" rel="noopener">
        <span class="btn-icon">🖱</span>
        Launch CPS Test
      </a>
      <div class="cps-note">Opens xbitlabs.com in a new tab</div>
    </div>
  </div>

  <script>
    const container = document.getElementById('stars');
    for (let i = 0; i < 70; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      const size = Math.random() * 2.5 + 0.5;
      s.style.cssText = `
        width: ${size}px; height: ${size}px;
        top: ${Math.random() * 100}%;
        left: ${Math.random() * 100}%;
        --d: ${(Math.random() * 2.5 + 1).toFixed(1)}s;
        animation-delay: ${(Math.random() * 2).toFixed(1)}s;
        opacity: ${(Math.random() * 0.5 + 0.1).toFixed(2)};
      `;
      container.appendChild(s);
    }
  </script>

</body>
</html>
